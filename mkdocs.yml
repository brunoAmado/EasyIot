site_name: "EasyIot Documentation"
site_description: "Beautiful, developer-friendly documentation for the EasyIot ESP8266/ESP32 firmware."
site_author: "Bruno Horta"
repo_name: "brunoAmado/EasyIot"
repo_url: "https://github.com/brunoAmado/EasyIot"

docs_dir: "wiki"
site_dir: "site"

theme:
  name: "material"
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: "slate"
      primary: "indigo"
      accent: "indigo"
      toggle:
        icon: "material/weather-sunny"
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: "default"
      primary: "indigo"
      accent: "indigo"
      toggle:
        icon: "material/weather-night"
        name: "Switch to dark mode"
  features:
    - "navigation.tabs"
    - "navigation.top"
    - "navigation.sections"
    - "search.suggest"
    - "search.highlight"
    - "content.code.copy"
    - "content.tooltips"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji

nav:
  - Welcome: index.md
  - Getting Started:
    - How to Build and Configure: How_To_Build_And_Configure.md
    - WiFi & Network Provisioning: Core_WiFi_BLE_Provisioning.md
    - Captive Portal: Captive_Portal_Assets.md
  - Hardware & Drivers:
    - Predefined Hardware Profiles: Hardware_Configuration_Profiles.md
    - Default GPIO Pinouts: Default_GPIO_Pins.md
    - Actuators & Relays: Actuator.md
    - Sensors & Presence Radars: Sensor.md
    - HAN Portugal Smart Meter: HAN_Portugal_Smart_Meter_Integration.md
  - Developer Core:
    - Config Management (ConfigOnofre): ConfigOnofre.md
    - Modbus Protocol: Modbus_Protocol_Master_Driver.md
    - MQTT & HA Auto-Discovery: MQTT_Client_&_HA_Discovery.md
    - Device Components: Device_Components_&_Core_Headers.md

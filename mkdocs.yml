site_name: "EasyIot Documentation"
site_description: "Beautiful, developer-friendly documentation for the EasyIot ESP8266/ESP32 firmware."
site_author: "Bruno Horta"
repo_name: "brunoAmado/EasyIot"
repo_url: "https://github.com/brunoAmado/EasyIot"

docs_dir: "wiki"
site_dir: "site"

theme:
  name: "material"
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: "slate"
      primary: "indigo"
      accent: "indigo"
      toggle:
        icon: "material/weather-sunny"
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: "default"
      primary: "indigo"
      accent: "indigo"
      toggle:
        icon: "material/weather-night"
        name: "Switch to dark mode"
  features:
    - "navigation.tabs"
    - "navigation.top"
    - "navigation.sections"
    - "search.suggest"
    - "search.highlight"
    - "content.code.copy"
    - "content.tooltips"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji

nav:
  - Welcome: index.md
  - Getting Started:
    - How to Build and Configure: How_To_Build_And_Configure.md
  - User Guide: User_Guide.md
  - Web Interface Guide: Web_Interface_Guide.md
  - Developer Guide: Developer_Guide.md
  - Troubleshooting & Recovery: Troubleshooting_And_Smoke_Tests.md

name: PlatformIO CI

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Minifiers globally
      run: npm install -g html-minifier uglify-js uglifycss

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          ~/-cache/pip
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio esptool

    - name: Build Web Panel Assets
      run: |
        if [ -f tools/build_webpanel.py ]; then
          python tools/build_webpanel.py
        else
          bash tools/html_converter.sh
        fi

    - name: Run PlatformIO Compilation Checks
      run: |
        pio run -e ESP8266_DEBUG
        pio run -e ESP32_DEBUG

    - name: Run PlatformIO Unit Tests
      run: pio test -e native
